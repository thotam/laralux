name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dpkg-dev \
            debhelper \
            fakeroot \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            build-essential

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # Build the Debian package via debian/rules (dpkg-buildpackage), the single
      # source of truth for packaging. `-d` skips the dpkg build-dep check because
      # Rust/Node come from the toolchain actions above, not apt. debian/rules runs
      # npm ci + npm run build + cargo build --release + cargo test itself.
      - name: Build Debian package
        run: dpkg-buildpackage -us -uc -b -d

      - name: Collect artifacts
        run: |
          mkdir -p dist-deb
          mv ../laralux_*_amd64.deb dist-deb/
          ls -la dist-deb

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTES: |
            ## Install (Debian/Ubuntu, x86_64)

            Download `laralux_<version>_amd64.deb` below, then:

            ```sh
            sudo apt install ./laralux_<version>_amd64.deb
            ```

            apt resolves the runtime dependencies automatically (no repository to add).
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "Laralux ${GITHUB_REF_NAME}" \
            --notes "${NOTES}" \
            dist-deb/*.deb
