<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laragon Linux</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Laragon Linux</h1>
      <div class="actions">
        <button id="start-all">Start All</button>
        <button id="stop-all">Stop All</button>
      </div>
    </header>
    <main>
      <section id="setup-section">
        <h2>Setup</h2>
        <ul id="setup"></ul>
        <button id="run-setup">Install missing</button>
      </section>
      <section>
        <h2>Services</h2>
        <table>
          <tbody id="services"></tbody>
        </table>
      </section>
      <section>
        <h2>Sites</h2>
        <ul id="sites"></ul>
      </section>
    </main>
    <script src="main.js"></script>
  </body>
</html>
